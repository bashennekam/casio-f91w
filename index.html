    <script src="script/CasioF91W.js"></script>
    <script>
        const myCasioF91W = new CasioF91W();

        function applyColor(color) {
            const watch = document.querySelector('.watch');
            watch.classList.remove('white', 'black', 'blue', 'original');
            watch.classList.add(color);

            document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            const activeDot = document.querySelector(`.color-dot[data-color="${color}"]`);
            if (activeDot) activeDot.classList.add('active');
        }

        const savedColor = localStorage.getItem('casio-f91w');
        if (savedColor) applyColor(savedColor);

        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                const color = dot.dataset.color;
                applyColor(color);
                localStorage.setItem('casio-f91w', color);
            });
        });
    </script>
